<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Michael Loftus">
    <meta name="description" content="Final project website: website storefront for a 3d printed item store">
    <title>Document</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="styles/style.css" rel="stylesheet">
    <link href="styles/checkoutStyle.css" rel="stylesheet">
    <script src="checkoutscript.js" defer></script>
    <link rel="icon" href="images/icon.ico">
</head>
<body>
    <header>
        <div id="header-container">
            <a href="index.html"><img src="images/logo.png" alt="ThreeDeeThrifts Logo"></a>
            
            <h1>ThreeDee Thrifts</h1>
            <p>Where 3D fun comes to life</p>
            <div id="links">
                <a href="index.html">Home</a>
                <a href="checkout.html">Checkout</a>
                <a href="site-plan.html">Site Plan</a>
            </div>
        </div>
    </header>

    <main>
        
        <div id="cart-box">
            <p>Your order: </p>
            <div id="cart-header">
                <p>Name</p>
                <p>Quantity</p>
                <p>Price</p>
            </div>
            <hr>
            <div id="cart-contents">
                <div class="item-summary">
                    <p>A gun</p>
                    <p>Like 5</p>
                    <p>$500.00</p>
                </div>
            </div>
            <hr>
            <div id="total-calculation">
                <p id="subtotal-text">Subtotal: $0.00</p>
                <p id="sales-tax">Sales tax: $0.00</p>
                <p>Total: $0.00</p>
            </div>
            <button id="clear-cart">Clear Cart</button>
            <hr>

            <div id='input-fields'>
                <form id="checkoutForm" action="#" method="get">
                    <label for="fname">First name*: </label><br>
                    <input type="text" id="fname" name="fname" required><br>

                    <label for="lname">Last name*: </label><br>
                    <input type="text" id="lname" name="lname" required><br>
                    <br>

                    <label for="street1">Street address 1*: </label><br>
                    <input type="text" id="street1" name="street1" required><br>

                    <label for="street2">Street address 2: </label><br>
                    <input type="text" id="street2" name="street2"><br>
                    <br>

                    <label for="city">City*: </label><br>
                    <input type="text" id="city" name="city" required><br>

                    <label for="state">State*: </label><br>
                    <select id="state" name="state" required>
                    <option value="">--Select a state--</option>
                    <option value="AL">Alabama</option>
                    <option value="AK">Alaska</option> <!--No sales tax-->
                    <option value="AZ">Arizona</option>
                    <option value="AR">Arkansas</option>
                    <option value="CA">California</option>
                    <option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option>
                    <option value="DE">Delaware</option> <!--No sales tax-->
                    <option value="FL">Florida</option>
                    <option value="GA">Georgia</option>
                    <option value="HI">Hawaii</option>
                    <option value="ID">Idaho</option>
                    <option value="IL">Illinois</option>
                    <option value="IN">Indiana</option>
                    <option value="IA">Iowa</option>
                    <option value="KS">Kansas</option>
                    <option value="KY">Kentucky</option>
                    <option value="LA">Louisiana</option>
                    <option value="ME">Maine</option>
                    <option value="MD">Maryland</option>
                    <option value="MA">Massachusetts</option>
                    <option value="MI">Michigan</option>
                    <option value="MN">Minnesota</option>
                    <option value="MS">Mississippi</option>
                    <option value="MO">Missouri</option>
                    <option value="MT">Montana</option> <!--No sales tax-->
                    <option value="NE">Nebraska</option>
                    <option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option> <!--No sales tax-->
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="NC">North Carolina</option>
                    <option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option> <!--No sales tax-->
                    <option value="PA">Pennsylvania</option>
                    <option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option>
                    <option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option>
                    <option value="TX">Texas</option>
                    <option value="UT">Utah</option>
                    <option value="VT">Vermont</option>
                    <option value="VA">Virginia</option>
                    <option value="WA">Washington</option>
                    <option value="WV">West Virginia</option>
                    <option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                    <!-- Add all 50 states -->
                    </select>

                    <label for="zip">ZIP*: </label><br>
                    <input type="text" id="zip" name="zip" required><br>


                    <p id="creditCardNumberContainer" class="hide" role="region" aria-labelledby="creditCardLabel">
                    <label id="creditCardLabel" for="creditCardNumber">Credit Card Number*:</label><br>
                    <input
                    type="text"
                    id="creditCardNumber"
                    name="creditCardNumber"
                    pattern="[0-9]{16}"
                    placeholder="Enter 16 digits"
                    required
                    /><br>
                    <label for="expirationDate">Expiration*</label><br>
                    <input 
                    type="text" 
                    id="month" 
                    name="expMonth" 
                    placeholder="MM"> <br>
                    <input 
                    type="text" 
                    id="year" 
                    name="expYear" 
                    placeholder="YY">
                    </p>

                    <button type="submit">Place Order</button>
                </form>
            </div>
        </div>

    </main>



    <footer>
        <div id="footer-box">
            <h1>ThreeDee Thrifts © 2026 - Michael Loftus</h1>
        </div>
    </footer>   
</body>
</html>
