<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Michael Loftus">
    <meta name="description" content="Final project website: website storefront for a 3d printed item store">
    <title>Document</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="styles/style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div id="header-container">
            <a href="index.html"><img src="images/logo.png" href="index.html" alt="ThreeDeeThrifts Logo"></a>
            
            <h1>ThreeDee Thrifts</h1>
            <p>Where 3D fun comes to life</p>
            <div id="links">
                <a href="index.html">Home</a>
                <a href="#">Store</a>
                <a href="#">About</a>
            </div>
        </div>
    </header>

    <main>
        <div class="main-bar">
            <h2>Featured Products</h2>
            <button id="cart-button"><img id="cart-button" src="images/cart-icon.png" alt="Shopping cart picture"></button>
        </div>
        <div id="product-container">
            <div class="product-box">
                <img class="product-img" src="images/monster.jpg" alt="#">
                <h3>Product Name</h3>
                <p class="description">This is where the product description would gohis is where the product description would gohis is where the product description would gohis is where the product description would go.</p>
                <p class="price">Price: $##.##</p>
                <button class="buy-button">Buy now</button>
            </div>
        </div>
    </main>



    <footer>
        <div id="footer-container">
            <div id="social">

            </div>
            <div id="footer-bar">

            </div>
        </div>
    </footer>
</body>
</html>
